    html, body {

    .status {
      font-size: 14px;
      color: var(--muted);
    }

      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .station-btn {
      background: #2a2a2a;
      border: none;

      padding: 12px 14px;
      text-align: left;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .station-btn.active {
      background: #333;
      border: 1px solid var(--accent);
    }

    .player {
      background: #252525;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .track-title {
      font-size: 16px;
      font-weight: 600;
    }

    .track-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 20px;
      display: flex;

    .play-btn:disabled {

    .volume input {

  const stationsEl = document.getElementById("stations");
  const statusEl = document.getElementById("status");
  const playBtn = document.getElementById("playBtn");
  const volumeEl = document.getElementById("volume");
  const trackTitleEl = document.getElementById("trackTitle");
  const trackSubEl = document.getElementById("trackSub");

  let audio = null;
  let mediaSession = null;
  let currentStation = null;
  let isPlaying = false;

  if ("mediaSession" in navigator) {
    mediaSession = navigator.mediaSession;
  }

  function initStations() {
    stationsEl.innerHTML = "";
    STATIONS.forEach((station) => {
      const btn = document.createElement("button");
      btn.className = "station-btn";
      btn.textContent = station.name;
      btn.addEventListener("click", () => {
        const activeBtn = document.querySelector(".station-btn.active");
        selectStation(station, btn);
        if (activeBtn) activeBtn.classList.remove("active");
      });
      stationsEl.appendChild(btn);
    });
  }

  function selectStation(station, btnElement) {
    if (currentStation && currentStation.id === station.id) {
      return;
    }

    document.querySelectorAll(".station-btn").forEach(b => b.classList.remove("active"));
    if (btnElement) btnElement.classList.add("active");

    if (audio) {
      audio.pause();
      audio.src = "";
    }

    currentStation = station;
    isPlaying = false;
    playBtn.disabled = false;
    playBtn.textContent = "▶";

    statusEl.textContent = "Выбрана станция: " + station.name;
    trackTitleEl.textContent = station.defaultTrack || "Радио";
    trackSubEl.textContent = station.name;

    updateMediaSessionMetadata(station);

    audio = new Audio(station.url);
    audio.volume = volumeEl.value;

    audio.addEventListener("play", () => {
      isPlaying = true;
      playBtn.textContent = "⏸";
[03.07.2026 19:26] Burdik Human: statusEl.textContent = "Воспроизведение: " + station.name;
      if (mediaSession) {
        mediaSession.playbackState = "playing";
      }
    });

    audio.addEventListener("pause", () => {
      isPlaying = false;
      playBtn.textContent = "▶";
      statusEl.textContent = "Воспроизведение остановлено: " + station.name;
      if (mediaSession) {
        mediaSession.playbackState = "paused";
      }
    });

    audio.addEventListener("error", (e) => {
      isPlaying = false;
      playBtn.textContent = "▶";
      statusEl.textContent = "Ошибка воспроизведения потока";
      if (mediaSession) {
        mediaSession.playbackState = "none";
      }
      console.error("Audio error:", e);
    });

    audio.addEventListener("loadeddata", () => {
      statusEl.textContent = "Поток готов: " + station.name;
    });
  }

  playBtn.addEventListener("click", () => {
    if (!currentStation) {
      statusEl.textContent = "Выберите станцию";
      return;
    }
    if (!audio) {
      const activeBtn = document.querySelector(".station-btn.active");
      selectStation(currentStation, activeBtn);
    }

    if (isPlaying) {
      audio.pause();
    } else {
      audio.play().catch(err => {
        statusEl.textContent = "Не удалось начать воспроизведение";
        console.error(err);
      });
    }
  });

  volumeEl.addEventListener("input", () => {
    if (audio) {
      audio.volume = volumeEl.value;
    }
  });

  function updateMediaSessionMetadata(station) {
    if (!mediaSession) return;

    const metadata = new MediaMetadata({
      title: station.defaultTrack || "Радио",
      artist: station.name,
      album: "Online Radio",
      artwork: [
        { src: "icon-192.png", sizes: "192x192", type: "image/png" },
        { src: "icon-512.png", sizes: "512x512", type: "image/png" }
      ]
    });

    mediaSession.metadata = metadata;
  }

  function setupMediaSessionHandlers() {
    if (!mediaSession) return;

    mediaSession.setActionHandler("play", () => {
      if (!isPlaying && audio) {
        audio.play().catch(err => {
          console.error("MediaSession play error:", err);
        });
      }
    });

    mediaSession.setActionHandler("pause", () => {
      if (isPlaying && audio) {
        audio.pause();
      }
    });

    mediaSession.setActionHandler("previoustrack", () => {
      // Можно реализовать переключение на предыдущую станцию
    });

    mediaSession.setActionHandler("nexttrack", () => {
      // Можно реализовать переключение на следующую станцию
    });

    mediaSession.setActionHandler("stop", () => {
      if (audio) {
        audio.pause();
        audio.src = "";
        isPlaying = false;
        playBtn.textContent = "▶";
        mediaSession.playbackState = "none";
      }
    });
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").then(() => {
      console.log("Service Worker зарегистрирован");
    }).catch(err => {
      console.error("Ошибка регистрации SW:", err);
    });
  }

  initStations();
  setupMediaSessionHandlers();
